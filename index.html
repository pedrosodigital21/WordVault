<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Vault 📘</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow-lg">
        <div class="card-body">
            <h1 class="card-title text-center mb-3">Word Vault 📘</h1>
            <p id="wordCounter" class="text-center fw-semibold mb-4">Total words: 0</p>

            <!-- Input group -->
            <div class="row g-2 mb-3">
                <div class="col-md-5">
                    <input type="text" id="wordInput" class="form-control" placeholder="Enter word...">
                </div>
                <div class="col-md-5">
                    <input type="text" id="translationInput" class="form-control" placeholder="Enter translation...">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" onclick="addWord()">Add</button>
                </div>
            </div>

            <div class="row g-2 mb-3 align-items-center">
                <div class="col-md-7 position-relative">
                    <input type="text" id="searchInput" class="form-control ps-5" placeholder="Search..." oninput="searchWords()">
                    <i class="fas fa-search position-absolute top-50 translate-middle-y ms-3 text-muted"></i>
                </div>
                <div class="col-md-2 d-grid">
                    <button id="toggleTranslate" class="btn btn-secondary" onclick="toggleTranslations()">
                        <i class="fas fa-language"></i>
                    </button>
                </div>
                <div class="col-md-3 d-grid">
                    <button class="btn btn-primary" onclick="exportJSON()">Export JSON</button>
                </div>
            </div>

            <ul id="wordList" class="list-group mb-3" style="max-height: 350px; overflow-y: auto;"></ul>
            <div id="emptyMessage" class="text-center text-muted">No words added yet.</div>
            <div id="uniqueness" class="text-center fst-italic text-secondary mt-2">
                This app is unique: no ads, no subscriptions, no distractions — just your words.
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
